<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Flower Garden</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;

background:
radial-gradient(2px 2px at 20px 30px,#fff,transparent),
radial-gradient(2px 2px at 100px 80px,#fff,transparent),
radial-gradient(2px 2px at 200px 120px,#fff,transparent),
radial-gradient(2px 2px at 300px 40px,#fff,transparent),
radial-gradient(2px 2px at 400px 200px,#fff,transparent),
radial-gradient(2px 2px at 500px 100px,#fff,transparent),
radial-gradient(2px 2px at 600px 150px,#fff,transparent),
radial-gradient(2px 2px at 700px 70px,#fff,transparent),
#020617;

background-size:800px 400px;
}
  
.scene{
position:relative;
width:600px;
height:400px;

/* Xóa transform méo mó */
/* transform:scale(1.5) translateY(120px); */
/* transform-origin:bottom center; */

animation:plantGrow 2s ease forwards;
}

svg{
background:transparent;
overflow:visible;
}

@keyframes plantGrow{
0%{
opacity:0;
}
100%{
opacity:1;
}
}

.stem g{
opacity:0;
animation:flowerAppear 1s ease forwards;
animation-delay:2s;
}

@keyframes flowerAppear{
to{opacity:1;}
}

.stem{
transform-origin:bottom center;
animation:sway 4s ease-in-out infinite;
}

@keyframes sway{
0%{transform:rotate(-2deg)}
50%{transform:rotate(2deg)}
100%{transform:rotate(-2deg)}
}

/* cỏ mọc */

.grass path{
stroke-dasharray:300;
stroke-dashoffset:300;
animation:grow 2s ease forwards;
}

@keyframes grow{
to{stroke-dashoffset:0;}
}

/* cỏ đung đưa */

.grassTall{
transform-origin:bottom;
animation:grassMove 7s ease-in-out infinite;
}

.grassTall:nth-child(2){animation-delay:1s;}
.grassTall:nth-child(3){animation-delay:2s;}
.grassTall:nth-child(4){animation-delay:0.5s;}

@keyframes grassMove{
0%{transform:rotate(-1.5deg)}
50%{transform:rotate(1.5deg)}
100%{transform:rotate(-1.5deg)}
}

.flowerGlow{
filter:drop-shadow(0 0 10px #ff9dc0)
drop-shadow(0 0 20px #ff9dc0);
}

.firefly {
  position: absolute;
  width: 6px;
  height: 6px;
  background: radial-gradient(circle, #fff799, #ffd700, transparent);
  border-radius: 50%;
  pointer-events: none;
  animation: glow 1s infinite alternate;
}

@keyframes glow {
  from {
    opacity: 0.4;
    transform: scale(0.8);
  }
  to {
    opacity: 1;
    transform: scale(1.3);
  }
}

</style>
</head>

<body>

<div class="scene">

<svg viewBox="0 0 400 420">

<!-- MASK LÀM MỜ GỐC -->
<defs>
<linearGradient id="fadeGradient" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="white"/>
<stop offset="75%" stop-color="white"/>
<stop offset="100%" stop-color="black"/>
</linearGradient>

<mask id="fadeMask">
<rect width="100%" height="100%" fill="url(#fadeGradient)"/>
</mask>
</defs>

<g mask="url(#fadeMask)">

<!-- CỎ RẬM -->
<g class="grass">
<!-- lớp sau -->
<g class="grassTall">
<!-- cong ra ngoài (trái) -->
<path d="M140 430 C80 330 70 250 60 210" stroke="#22d36a" stroke-width="4" fill="none" stroke-linecap="round"/>
<path d="M150 430 C90 330 80 250 90 220" stroke="#18c75a" stroke-width="4" fill="none" stroke-linecap="round"/>
<!-- cong ra ngoài (phải) -->
<path d="M160 430 C220 330 230 250 260 230" stroke="#22d36a" stroke-width="4" fill="none" stroke-linecap="round"/>
<path d="M170 430 C260 330 280 250 300 220" stroke="#18c75a" stroke-width="4" fill="none" stroke-linecap="round"/>
<path d="M180 430 C300 330 320 250 340 210" stroke="#22d36a" stroke-width="4" fill="none" stroke-linecap="round"/>
<path d="M130 430 C60 330 50 250 30 200" stroke="#18c75a" stroke-width="4" fill="none" stroke-linecap="round"/>
<path d="M190 430 C340 330 360 250 380 200" stroke="#22d36a" stroke-width="4" fill="none" stroke-linecap="round"/>
  
</g>


<!-- lớp giữa -->
<g class="grassTall">
<!-- trái -->
<path d="M150 430 C90 340 80 260 70 220" stroke="#18c75a" stroke-width="6" fill="none" stroke-linecap="round"/>
<!-- phải -->
<path d="M160 430 C230 340 240 260 270 230" stroke="#22d36a" stroke-width="6" fill="none" stroke-linecap="round"/>
<path d="M170 430 C270 340 290 260 310 220" stroke="#18c75a" stroke-width="6" fill="none" stroke-linecap="round"/>
<path d="M180 430 C310 340 330 260 350 210" stroke="#22d36a" stroke-width="6" fill="none" stroke-linecap="round"/>
<path d="M140 430 C70 340 60 260 40 220" stroke="#22d36a" stroke-width="6" fill="none" stroke-linecap="round"/>
<path d="M210 430 C320 340 340 260 360 220" stroke="#18c75a" stroke-width="6" fill="none" stroke-linecap="round"/>
<!-- giữa -->
<path d="M190 430 C220 350 240 300 230 280" stroke="#18c75a" stroke-width="6" fill="none" stroke-linecap="round"/>
<path d="M200 430 C260 350 270 300 250 270" stroke="#22d36a" stroke-width="6" fill="none" stroke-linecap="round"/>

</g>


<!-- lớp trước -->
<g class="grassTall">
<!-- trái -->
<path d="M165 430 C120 360 100 340 80 330" stroke="#22d36a" stroke-width="7" fill="none" stroke-linecap="round"/>
<!-- giữa -->
<path d="M175 430 C175 360 175 340 175 330" stroke="#18c75a" stroke-width="7" fill="none" stroke-linecap="round"/>
<!-- phải -->
<path d="M185 430 C240 360 260 340 280 330" stroke="#22d36a" stroke-width="7" fill="none" stroke-linecap="round"/>
<path d="M195 430 C280 360 300 340 320 330" stroke="#18c75a" stroke-width="7" fill="none" stroke-linecap="round"/>
<path d="M205 430 C320 360 340 340 360 330" stroke="#22d36a" stroke-width="7" fill="none" stroke-linecap="round"/>
<path d="M155 430 C100 360 80 340 60 330" stroke="#18c75a" stroke-width="7" fill="none" stroke-linecap="round"/>
<path d="M215 430 C320 360 340 340 360 330" stroke="#22d36a" stroke-width="7" fill="none" stroke-linecap="round"/>

</g>

</g>
  
<!-- HOA TRÁI -->
<g class="stem">
<line x1="200" y1="450" x2="140" y2="160" stroke="#7a5532" stroke-width="8"/>

<ellipse cx="140" cy="260" rx="20" ry="10" fill="#1f7a3f" transform="rotate(-30 140 260)"/>
<ellipse cx="165" cy="240" rx="20" ry="10" fill="#1f7a3f" transform="rotate(30 165 240)"/>

<g transform="translate(140,160)" class="flowerGlow">
<ellipse cx="-22" cy="-20" rx="22" ry="34" fill="#ff9dc0" transform="rotate(-25)"/>
<ellipse cx="22" cy="-20" rx="22" ry="34" fill="#ff9dc0" transform="rotate(25)"/>
<ellipse cx="0" cy="-45" rx="24" ry="48" fill="#ff9dc0"/>
<ellipse cx="0" cy="-5" rx="18" ry="8" fill="#ffffff"/>
<ellipse cx="0" cy="0" rx="14" ry="6" fill="#ffd166"/>
</g>
</g>

<!-- HOA GIỮA -->
<g class="stem">
<line x1="200" y1="450" x2="200" y2="120" stroke="#7a5532" stroke-width="8"/>
  
<ellipse cx="180" cy="280" rx="20" ry="10" fill="#1f7a3f" transform="rotate(-30 180 280)"/>
<ellipse cx="220" cy="250" rx="20" ry="10" fill="#1f7a3f" transform="rotate(30 220 250)"/>

<g transform="translate(200,120)" class="flowerGlow">
<ellipse cx="-22" cy="-20" rx="22" ry="34" fill="#ff9dc0" transform="rotate(-25)"/>
<ellipse cx="22" cy="-20" rx="22" ry="34" fill="#ff9dc0" transform="rotate(25)"/>
<ellipse cx="0" cy="-45" rx="24" ry="48" fill="#ff9dc0"/>
<ellipse cx="0" cy="-5" rx="18" ry="8" fill="#ffffff"/>
<ellipse cx="0" cy="0" rx="14" ry="6" fill="#ffd166"/>
</g>
</g>

<!-- HOA PHẢI -->
<g class="stem">
<line x1="200" y1="450" x2="260" y2="160" stroke="#7a5532" stroke-width="8"/>
  
<ellipse cx="235" cy="240" rx="20" ry="10" fill="#1f7a3f" transform="rotate(-30 235 240)"/>
<ellipse cx="260" cy="260" rx="20" ry="10" fill="#1f7a3f" transform="rotate(30 260 260)"/>

<g transform="translate(260,160)" class="flowerGlow">
<ellipse cx="-22" cy="-20" rx="22" ry="34" fill="#ff9dc0" transform="rotate(-25)"/>
<ellipse cx="22" cy="-20" rx="22" ry="34" fill="#ff9dc0" transform="rotate(25)"/>
<ellipse cx="0" cy="-45" rx="24" ry="48" fill="#ff9dc0"/>
<ellipse cx="0" cy="-5" rx="18" ry="8" fill="#ffffff"/>
<ellipse cx="0" cy="0" rx="14" ry="6" fill="#ffd166"/>
</g>
</g>

</g>

</svg>

</div>

<script>

function createFirefly(){

  const firefly = document.createElement("div");
  firefly.className = "firefly";
  document.body.appendChild(firefly);

  // Lấy vị trí chính xác của scene
  const scene = document.querySelector(".scene");
  const sceneRect = scene.getBoundingClientRect();

  // vị trí 3 bông hoa
  const flowers = [
{x: sceneRect.left + sceneRect.width*0.33, y: sceneRect.top + sceneRect.height*0.25},
{x: sceneRect.left + sceneRect.width*0.50, y: sceneRect.top + sceneRect.height*0.15},
{x: sceneRect.left + sceneRect.width*0.67, y: sceneRect.top + sceneRect.height*0.25}
];

  // chọn ngẫu nhiên 1 bông
  const flower = flowers[Math.floor(Math.random()*flowers.length)];

  let x = flower.x + (Math.random()-0.5)*20;
  let y = flower.y + 20;

  firefly.style.left = x + "px";
  firefly.style.top = y + "px";

  let vx = (Math.random() - 0.5) * 0.4;
  let vy = -0.8 - Math.random()*0.8;

  function animate(){

    x += vx;
    y += vy;

    // bay hơi zigzag
    vx += (Math.random()-0.5)*0.01;

    firefly.style.left = x + "px";
    firefly.style.top = y + "px";

    // chỉ biến mất khi gần hết màn hình
    if(y > -50){
      requestAnimationFrame(animate);
    }else{
      firefly.remove();
    }

  }

  animate();
}


// tạo đom đóm liên tục
setInterval(()=>{

  let count = Math.random()*3 + 1;

  for(let i=0;i<count;i++){
    createFirefly();
  }

},700);

</script>

</body>
</html>
