<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Flower Garden</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;

background:
radial-gradient(2px 2px at 20px 30px,#fff,transparent),
radial-gradient(2px 2px at 100px 80px,#fff,transparent),
radial-gradient(2px 2px at 200px 120px,#fff,transparent),
radial-gradient(2px 2px at 300px 40px,#fff,transparent),
radial-gradient(2px 2px at 400px 200px,#fff,transparent),
radial-gradient(2px 2px at 500px 100px,#fff,transparent),
radial-gradient(2px 2px at 600px 150px,#fff,transparent),
radial-gradient(2px 2px at 700px 70px,#fff,transparent),
#020617;

background-size:800px 400px;
}

.scene{
position:relative;
width:600px;
height:400px;
transform:scale(1.5) translateY(60px);
transform-origin:bottom center;
animation:plantGrow 2s ease forwards;
}

/* lớp tối dưới để glow hòa vào nền */
.scene::after{
content:"";
position:absolute;
bottom:0;
left:0;
width:100%;
height:60%;
background:radial-gradient(circle at center bottom,
rgba(2,6,23,0) 0%,
rgba(2,6,23,0.6) 60%,
rgba(2,6,23,1) 100%);
pointer-events:none;
}

@keyframes plantGrow{
0%{
transform:scale(1.5) translateY(120px);
opacity:0;
}
100%{
transform:scale(1.5) translateY(60px);
opacity:1;
}
}

.stem g{
opacity:0;
animation:flowerAppear 1s ease forwards;
animation-delay:2s;
}

@keyframes flowerAppear{
to{opacity:1;}
}

.stem{
transform-origin:bottom center;
animation:sway 4s ease-in-out infinite;
}

@keyframes sway{
0%{transform:rotate(-2deg)}
50%{transform:rotate(2deg)}
100%{transform:rotate(-2deg)}
}

/* cỏ mọc */

.grass path{
stroke-dasharray:300;
stroke-dashoffset:300;
animation:grow 2s ease forwards;
}

@keyframes grow{
to{stroke-dashoffset:0;}
}

/* cỏ đung đưa */

.grassTall{
transform-origin:bottom;
animation:grassMove 5s ease-in-out infinite;
}

.grassTall:nth-child(2){animation-delay:1s;}
.grassTall:nth-child(3){animation-delay:2s;}
.grassTall:nth-child(4){animation-delay:0.5s;}

@keyframes grassMove{
0%{transform:rotate(-4deg)}
50%{transform:rotate(4deg)}
100%{transform:rotate(-4deg)}
}

/* glow hoa */

.flowerGlow{
filter:
drop-shadow(0 0 8px #ff9dc0)
drop-shadow(0 0 18px #ff9dc0)
drop-shadow(0 0 28px rgba(255,157,192,0.5));
}

/* đom đóm */

.firefly {
position:absolute;
width:6px;
height:6px;
background:radial-gradient(circle,#fff799,#ffd700,transparent);
border-radius:50%;
pointer-events:none;
animation:glow 1s infinite alternate;
}

@keyframes glow{
from{
opacity:0.4;
transform:scale(0.8);
}
to{
opacity:1;
transform:scale(1.3);
}
}

</style>
</head>

<body>

<div class="scene">

<svg viewBox="0 0 400 420">

<defs>
<linearGradient id="fadeGradient" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="white"/>
<stop offset="75%" stop-color="white"/>
<stop offset="100%" stop-color="black"/>
</linearGradient>

<mask id="fadeMask">
<rect width="100%" height="100%" fill="url(#fadeGradient)"/>
</mask>
</defs>

<g mask="url(#fadeMask)">

<!-- CỎ -->

<g class="grass">

<g class="grassTall">
<path d="M140 400 Q130 330 120 210" stroke="#22d36a" stroke-width="4" fill="none" stroke-linecap="round"/>
<path d="M150 400 Q150 340 150 220" stroke="#18c75a" stroke-width="4" fill="none" stroke-linecap="round"/>
<path d="M160 400 Q170 340 180 230" stroke="#22d36a" stroke-width="4" fill="none" stroke-linecap="round"/>
<path d="M170 400 Q180 330 200 220" stroke="#18c75a" stroke-width="4" fill="none" stroke-linecap="round"/>
<path d="M180 400 Q200 330 220 210" stroke="#22d36a" stroke-width="4" fill="none" stroke-linecap="round"/>
</g>

</g>

<!-- HOA GIỮA -->

<g class="stem">

<line x1="200" y1="400" x2="200" y2="180" stroke="#7a5532" stroke-width="8"/>

<ellipse cx="180" cy="280" rx="20" ry="10" fill="#1f7a3f" transform="rotate(-30 180 280)"/>
<ellipse cx="220" cy="250" rx="20" ry="10" fill="#1f7a3f" transform="rotate(30 220 250)"/>

<g transform="translate(200,180)" class="flowerGlow">

<ellipse cx="-22" cy="-20" rx="22" ry="34" fill="#ff9dc0" transform="rotate(-25)"/>
<ellipse cx="22" cy="-20" rx="22" ry="34" fill="#ff9dc0" transform="rotate(25)"/>
<ellipse cx="0" cy="-45" rx="24" ry="48" fill="#ff9dc0"/>

<ellipse cx="0" cy="-5" rx="18" ry="8" fill="#ffffff"/>
<ellipse cx="0" cy="0" rx="14" ry="6" fill="#ffd166"/>

</g>

</g>

</g>

</svg>

</div>

<script>

function createFirefly(){

const firefly=document.createElement("div");
firefly.className="firefly";

document.body.appendChild(firefly);

let startX=window.innerWidth/2+(Math.random()*120-60);
let startY=window.innerHeight/2+80;

firefly.style.left=startX+"px";
firefly.style.top=startY+"px";

let x=startX;
let y=startY;

let vx=(Math.random()-0.5)*0.6;
let vy=-1-Math.random()*1.5;

let life=0;

function animate(){

life++;

x+=vx;
y+=vy;

firefly.style.left=x+"px";
firefly.style.top=y+"px";

firefly.style.opacity=1-life/120;

if(life<120){
requestAnimationFrame(animate);
}else{
firefly.remove();
}

}

animate();
}

setInterval(()=>{

let count=Math.random()*2+1;

for(let i=0;i<count;i++){
createFirefly();
}

},800);

</script>

</body>
</html>
