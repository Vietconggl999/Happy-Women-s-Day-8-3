<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Flower Animation</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:flex-end;
background:#0f172a;
overflow:hidden;
}

.scene{
position:relative;
width:600px;
height:400px;
}

.plant{
position:absolute;
bottom:-380px;
width:200px;
animation:grow 2s ease forwards;
}

.p1{left:60px;}
.p2{left:200px; animation-delay:.8s;}
.p3{left:340px; animation-delay:1.6s;}

@keyframes grow{
to{
bottom:0;
}
}

.petal ellipse{
transform-origin:100px 95px;
animation:bloom .8s ease forwards;
animation-delay:2.5s;
transform:scale(0);
}

@keyframes bloom{
to{
transform:scale(1);
}
}

.grass path{
stroke-dasharray:200;
stroke-dashoffset:200;
animation:grassGrow 2s linear forwards;
animation-delay:1s;
}

@keyframes grassGrow{
to{
stroke-dashoffset:0;
}
}

</style>
</head>

<body>

<div class="scene">

<!-- plant 1 -->
<svg viewBox="0 0 200 360" class="plant p1">

<rect x="97" y="110" width="8" height="250" fill="#7a5532" rx="4"/>

<ellipse cx="75" cy="230" rx="28" ry="14" fill="#1f7a3f" transform="rotate(-35 75 230)"/>
<ellipse cx="125" cy="250" rx="28" ry="14" fill="#1f7a3f" transform="rotate(35 125 250)"/>

<g class="petal">
<ellipse cx="100" cy="65" rx="30" ry="36" fill="#ff9dc0"/>
<ellipse cx="135" cy="95" rx="30" ry="36" fill="#ff9dc0"/>
<ellipse cx="65" cy="95" rx="30" ry="36" fill="#ff9dc0"/>
<ellipse cx="115" cy="120" rx="28" ry="34" fill="#ff8fb5"/>
<ellipse cx="85" cy="120" rx="28" ry="34" fill="#ff8fb5"/>
</g>

<circle cx="100" cy="95" r="16" fill="#ffd166"/>

<g class="grass">
<path d="M100 360 Q80 250 70 170" stroke="#1ecb5a" stroke-width="6" fill="none" stroke-linecap="round"/>
<path d="M100 360 Q60 260 40 200" stroke="#22d36a" stroke-width="5" fill="none" stroke-linecap="round"/>
<path d="M100 360 Q120 250 130 170" stroke="#1ecb5a" stroke-width="6" fill="none" stroke-linecap="round"/>
</g>

</svg>

<!-- plant 2 -->
<svg viewBox="0 0 200 360" class="plant p2">

<rect x="97" y="110" width="8" height="250" fill="#7a5532" rx="4"/>

<ellipse cx="75" cy="230" rx="28" ry="14" fill="#1f7a3f" transform="rotate(-35 75 230)"/>
<ellipse cx="125" cy="250" rx="28" ry="14" fill="#1f7a3f" transform="rotate(35 125 250)"/>

<g class="petal">
<ellipse cx="100" cy="65" rx="30" ry="36" fill="#ff9dc0"/>
<ellipse cx="135" cy="95" rx="30" ry="36" fill="#ff9dc0"/>
<ellipse cx="65" cy="95" rx="30" ry="36" fill="#ff9dc0"/>
<ellipse cx="115" cy="120" rx="28" ry="34" fill="#ff8fb5"/>
<ellipse cx="85" cy="120" rx="28" ry="34" fill="#ff8fb5"/>
</g>

<circle cx="100" cy="95" r="16" fill="#ffd166"/>

</svg>

<!-- plant 3 -->
<svg viewBox="0 0 200 360" class="plant p3">

<rect x="97" y="110" width="8" height="250" fill="#7a5532" rx="4"/>

<ellipse cx="75" cy="230" rx="28" ry="14" fill="#1f7a3f" transform="rotate(-35 75 230)"/>
<ellipse cx="125" cy="250" rx="28" ry="14" fill="#1f7a3f" transform="rotate(35 125 250)"/>

<g class="petal">
<ellipse cx="100" cy="65" rx="30" ry="36" fill="#ff9dc0"/>
<ellipse cx="135" cy="95" rx="30" ry="36" fill="#ff9dc0"/>
<ellipse cx="65" cy="95" rx="30" ry="36" fill="#ff9dc0"/>
<ellipse cx="115" cy="120" rx="28" ry="34" fill="#ff8fb5"/>
<ellipse cx="85" cy="120" rx="28" ry="34" fill="#ff8fb5"/>
</g>

<circle cx="100" cy="95" r="16" fill="#ffd166"/>

</svg>

</div>

</body>
</html>
