<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Flower Garden</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;

background:
radial-gradient(2px 2px at 20px 30px,#fff,transparent),
radial-gradient(2px 2px at 100px 80px,#fff,transparent),
radial-gradient(2px 2px at 200px 120px,#fff,transparent),
radial-gradient(2px 2px at 300px 40px,#fff,transparent),
radial-gradient(2px 2px at 400px 200px,#fff,transparent),
radial-gradient(2px 2px at 500px 100px,#fff,transparent),
radial-gradient(2px 2px at 600px 150px,#fff,transparent),
radial-gradient(2px 2px at 700px 70px,#fff,transparent),
#020617;

background-size:800px 400px;
}

.scene{
position:relative;
width:600px;
height:400px;

transform:scale(1.5) translateY(60px);
transform-origin:bottom center;

animation:plantGrow 2s ease forwards;
}

svg{
background:transparent;
overflow:visible;
}

@keyframes plantGrow{
0%{
transform:scale(1.5) translateY(120px);
opacity:0;
}
100%{
transform:scale(1.5) translateY(60px);
opacity:1;
}
}

.stem g{
opacity:0;
animation:flowerAppear 1s ease forwards;
animation-delay:2s;
}

@keyframes flowerAppear{
to{opacity:1;}
}

.stem{
transform-origin:bottom center;
animation:sway 4s ease-in-out infinite;
}

@keyframes sway{
0%{transform:rotate(-2deg)}
50%{transform:rotate(2deg)}
100%{transform:rotate(-2deg)}
}

/* cỏ mọc */

.grass path{
stroke-dasharray:300;
stroke-dashoffset:300;
animation:grow 2s ease forwards;
}

@keyframes grow{
to{stroke-dashoffset:0;}
}

/* cỏ đung đưa */

.grassTall{
transform-origin:bottom;
animation:grassMove 5s ease-in-out infinite;
}

.grassTall:nth-child(2){animation-delay:1s;}
.grassTall:nth-child(3){animation-delay:2s;}
.grassTall:nth-child(4){animation-delay:0.5s;}

@keyframes grassMove{
0%{transform:rotate(-4deg)}
50%{transform:rotate(4deg)}
100%{transform:rotate(-4deg)}
}

.flowerGlow{
filter:drop-shadow(0 0 10px #ff9dc0)
drop-shadow(0 0 20px #ff9dc0);
}

.firefly {
  position: absolute;
  width: 6px;
  height: 6px;
  background: radial-gradient(circle, #fff799, #ffd700, transparent);
  border-radius: 50%;
  pointer-events: none;
  animation: glow 1s infinite alternate;
}

@keyframes glow {
  from {
    opacity: 0.4;
    transform: scale(0.8);
  }
  to {
    opacity: 1;
    transform: scale(1.3);
  }
}

</style>
</head>

<body>

<div class="scene">

<svg viewBox="0 0 400 420">

<!-- MASK LÀM MỜ GỐC -->
<defs>
<linearGradient id="fadeGradient" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="white"/>
<stop offset="75%" stop-color="white"/>
<stop offset="100%" stop-color="black"/>
</linearGradient>

<mask id="fadeMask">
<rect width="100%" height="100%" fill="url(#fadeGradient)"/>
</mask>
</defs>

<g mask="url(#fadeMask)">

<!-- CỎ RẬM -->
<g class="grass">

<!-- lớp sau -->
<g class="grassTall">
<path d="M140 400 Q130 330 120 210" stroke="#22d36a" stroke-width="4" fill="none" stroke-linecap="round"/>
<path d="M150 400 Q150 340 150 220" stroke="#18c75a" stroke-width="4" fill="none" stroke-linecap="round"/>
<path d="M160 400 Q170 340 180 230" stroke="#22d36a" stroke-width="4" fill="none" stroke-linecap="round"/>
<path d="M170 400 Q180 330 200 220" stroke="#18c75a" stroke-width="4" fill="none" stroke-linecap="round"/>
<path d="M180 400 Q200 330 220 210" stroke="#22d36a" stroke-width="4" fill="none" stroke-linecap="round"/>
<path d="M190 400 Q210 340 240 230" stroke="#18c75a" stroke-width="4" fill="none" stroke-linecap="round"/>
<path d="M200 400 Q230 330 260 210" stroke="#22d36a" stroke-width="4" fill="none" stroke-linecap="round"/>
</g>

<!-- lớp giữa -->
<g class="grassTall">
<path d="M150 400 Q140 350 130 280" stroke="#18c75a" stroke-width="6" fill="none" stroke-linecap="round"/>
<path d="M160 400 Q160 350 160 270" stroke="#22d36a" stroke-width="6" fill="none" stroke-linecap="round"/>
<path d="M170 400 Q180 350 190 280" stroke="#18c75a" stroke-width="6" fill="none" stroke-linecap="round"/>
<path d="M180 400 Q200 350 210 270" stroke="#22d36a" stroke-width="6" fill="none" stroke-linecap="round"/>
<path d="M190 400 Q220 350 230 280" stroke="#18c75a" stroke-width="6" fill="none" stroke-linecap="round"/>
<path d="M200 400 Q240 350 250 270" stroke="#22d36a" stroke-width="6" fill="none" stroke-linecap="round"/>
</g>

<!-- lớp trước -->
<g class="grassTall">
<path d="M165 400 Q160 370 155 330" stroke="#22d36a" stroke-width="7" fill="none" stroke-linecap="round"/>
<path d="M175 400 Q175 370 175 330" stroke="#18c75a" stroke-width="7" fill="none" stroke-linecap="round"/>
<path d="M185 400 Q190 370 195 330" stroke="#22d36a" stroke-width="7" fill="none" stroke-linecap="round"/>
<path d="M195 400 Q205 370 210 330" stroke="#18c75a" stroke-width="7" fill="none" stroke-linecap="round"/>
<path d="M205 400 Q220 370 225 330" stroke="#22d36a" stroke-width="7" fill="none" stroke-linecap="round"/>
</g>

</g>

<!-- HOA TRÁI -->
<g class="stem">
<line x1="200" y1="400" x2="140" y2="220" stroke="#7a5532" stroke-width="8"/>

<ellipse cx="140" cy="260" rx="20" ry="10" fill="#1f7a3f" transform="rotate(-30 140 260)"/>
<ellipse cx="165" cy="240" rx="20" ry="10" fill="#1f7a3f" transform="rotate(30 165 240)"/>

<g transform="translate(140,220)" class="flowerGlow">
<ellipse cx="-22" cy="-20" rx="22" ry="34" fill="#ff9dc0" transform="rotate(-25)"/>
<ellipse cx="22" cy="-20" rx="22" ry="34" fill="#ff9dc0" transform="rotate(25)"/>
<ellipse cx="0" cy="-45" rx="24" ry="48" fill="#ff9dc0"/>
<ellipse cx="0" cy="-5" rx="18" ry="8" fill="#ffffff"/>
<ellipse cx="0" cy="0" rx="14" ry="6" fill="#ffd166"/>
</g>
</g>

<!-- HOA GIỮA -->
<g class="stem">
<line x1="200" y1="400" x2="200" y2="180" stroke="#7a5532" stroke-width="8"/>

<ellipse cx="180" cy="280" rx="20" ry="10" fill="#1f7a3f" transform="rotate(-30 180 280)"/>
<ellipse cx="220" cy="250" rx="20" ry="10" fill="#1f7a3f" transform="rotate(30 220 250)"/>

<g transform="translate(200,180)" class="flowerGlow">
<ellipse cx="-22" cy="-20" rx="22" ry="34" fill="#ff9dc0" transform="rotate(-25)"/>
<ellipse cx="22" cy="-20" rx="22" ry="34" fill="#ff9dc0" transform="rotate(25)"/>
<ellipse cx="0" cy="-45" rx="24" ry="48" fill="#ff9dc0"/>
<ellipse cx="0" cy="-5" rx="18" ry="8" fill="#ffffff"/>
<ellipse cx="0" cy="0" rx="14" ry="6" fill="#ffd166"/>
</g>
</g>

<!-- HOA PHẢI -->
<g class="stem">
<line x1="200" y1="400" x2="260" y2="220" stroke="#7a5532" stroke-width="8"/>

<ellipse cx="235" cy="240" rx="20" ry="10" fill="#1f7a3f" transform="rotate(-30 235 240)"/>
<ellipse cx="260" cy="260" rx="20" ry="10" fill="#1f7a3f" transform="rotate(30 260 260)"/>

<g transform="translate(260,220)" class="flowerGlow">
<ellipse cx="-22" cy="-20" rx="22" ry="34" fill="#ff9dc0" transform="rotate(-25)"/>
<ellipse cx="22" cy="-20" rx="22" ry="34" fill="#ff9dc0" transform="rotate(25)"/>
<ellipse cx="0" cy="-45" rx="24" ry="48" fill="#ff9dc0"/>
<ellipse cx="0" cy="-5" rx="18" ry="8" fill="#ffffff"/>
<ellipse cx="0" cy="0" rx="14" ry="6" fill="#ffd166"/>
</g>
</g>

</g>

</svg>

</div>

<script>

function createFirefly(){

  const firefly = document.createElement("div");
  firefly.className = "firefly";

  document.body.appendChild(firefly);

  const scene = document.querySelector(".scene");
  const rect = scene.getBoundingClientRect();

  let startX = rect.left + rect.width/2 + (Math.random()*80 - 40);
  let startY = rect.top + rect.height/2;

  firefly.style.left = startX + "px";
  firefly.style.top = startY + "px";

  let x = startX;
  let y = startY;

  let vx = (Math.random() - 0.5) * 0.6;
  let vy = -1 - Math.random()*1.5;

  let life = 0;

  function animate(){

    life++;

    x += vx;
    y += vy;

    firefly.style.left = x + "px";
    firefly.style.top = y + "px";

    firefly.style.opacity = 1 - life/120;

    if(life < 120){
      requestAnimationFrame(animate);
    }else{
      firefly.remove();
    }

  }

  animate();
}

// tạo đom đóm liên tục
setInterval(()=>{

  let count = Math.random()*2 + 1;

  for(let i=0;i<count;i++){
    createFirefly();
  }

},800);

</script>

</body>
</html>
