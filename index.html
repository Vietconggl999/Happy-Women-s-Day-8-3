<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Flower Garden</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;

background:
radial-gradient(2px 2px at 20px 30px,#fff,transparent),
radial-gradient(2px 2px at 100px 80px,#fff,transparent),
radial-gradient(2px 2px at 200px 120px,#fff,transparent),
radial-gradient(2px 2px at 300px 40px,#fff,transparent),
radial-gradient(2px 2px at 400px 200px,#fff,transparent),
radial-gradient(2px 2px at 500px 100px,#fff,transparent),
radial-gradient(2px 2px at 600px 150px,#fff,transparent),
radial-gradient(2px 2px at 700px 70px,#fff,transparent),
radial-gradient(2px 2px at 50px 200px,#fff,transparent),
radial-gradient(2px 2px at 150px 250px,#fff,transparent),
radial-gradient(2px 2px at 250px 300px,#fff,transparent),
radial-gradient(2px 2px at 350px 180px,#fff,transparent),
radial-gradient(2px 2px at 450px 260px,#fff,transparent),
radial-gradient(2px 2px at 550px 220px,#fff,transparent),
radial-gradient(2px 2px at 650px 300px,#fff,transparent),
radial-gradient(2px 2px at 750px 200px,#fff,transparent),
#020617;

background-size:800px 400px;
}

.scene{
position:relative;
width:600px;
height:400px;

/* kéo cây xuống */
transform:scale(1.5) translateY(60px);
transform-origin:bottom center;

animation:plantGrow 2s ease forwards;
}

@keyframes plantGrow{
0%{
transform:scale(1.5) translateY(120px);
opacity:0;
}
100%{
transform:scale(1.5) translateY(60px);
opacity:1;
}
}

.stem g{
opacity:0;
animation:flowerAppear 1s ease forwards;
animation-delay:2s;
}

@keyframes flowerAppear{
to{opacity:1;}
}

.stem{
transform-origin:bottom center;
animation:sway 4s ease-in-out infinite;
}

@keyframes sway{
0%{transform:rotate(-2deg)}
50%{transform:rotate(2deg)}
100%{transform:rotate(-2deg)}
}

/* cỏ mọc */

.grass path{
stroke-dasharray:300;
stroke-dashoffset:300;
animation:grow 2s ease forwards;
}

@keyframes grow{
to{stroke-dashoffset:0;}
}

/* cỏ đung đưa */

.grassTall{
transform-origin:bottom;
animation:grassMove 5s ease-in-out infinite;
}

.grassTall:nth-child(2){animation-delay:1s;}
.grassTall:nth-child(3){animation-delay:2s;}
.grassTall:nth-child(4){animation-delay:0.5s;}

@keyframes grassMove{
0%{transform:rotate(-4deg)}
50%{transform:rotate(4deg)}
100%{transform:rotate(-4deg)}
}

/* mặt đất */

.ground{
position:absolute;
bottom:-30px;
width:100%;
height:120px;

background:linear-gradient(to top,#020617,transparent);

filter:blur(80px);
opacity:0.8;

pointer-events:none;
}

/* sương ở gốc cây */

.groundMist{
position:absolute;
bottom:-10px;
width:100%;
height:120px;

background:radial-gradient(circle at center,#020617 0%,transparent 70%);

filter:blur(90px);
opacity:0.9;
pointer-events:none;
}

.flowerGlow{
filter:drop-shadow(0 0 10px #ff9dc0)
       drop-shadow(0 0 20px #ff9dc0);
}

</style>
</head>

<body>

<div class="scene">

<div class="ground"></div>
<div class="groundMist"></div>

<svg viewBox="0 0 400 420">

<!-- phần SVG của mày giữ nguyên -->
