<script>

function startAnimation(){

const card = document.querySelector(".card")
const area = document.getElementById("heartArea")
const big = document.getElementById("bigHeart")

const rect = card.getBoundingClientRect()

/* tạo tim quanh card */

for(let i=0;i<20;i++){

let heart = document.createElement("div")
heart.className = "smallHeart"
heart.innerHTML = "💖"

heart.style.position = "fixed"

/* random quanh card */

let side = Math.floor(Math.random()*4)

if(side===0){ // trên
heart.style.left = rect.left + Math.random()*rect.width + "px"
heart.style.top = rect.top - 40 + "px"
}

if(side===1){ // dưới
heart.style.left = rect.left + Math.random()*rect.width + "px"
heart.style.top = rect.bottom + 40 + "px"
}

if(side===2){ // trái
heart.style.left = rect.left - 40 + "px"
heart.style.top = rect.top + Math.random()*rect.height + "px"
}

if(side===3){ // phải
heart.style.left = rect.right + 40 + "px"
heart.style.top = rect.top + Math.random()*rect.height + "px"
}

heart.style.transition="all 1s ease"

document.body.appendChild(heart)

/* bay vào giữa */

setTimeout(()=>{

heart.style.left = rect.left + rect.width/2 + "px"
heart.style.top = rect.top + rect.height/2 + "px"

},50)

}

/* tạo tim to */

setTimeout(()=>{

big.innerHTML = "❤️"

document.getElementById("message").style.display="block"

},1100)

}

</script>
