<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Flower Garden</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:flex-end;
overflow:hidden;

/* bầu trời sao */
background:
radial-gradient(2px 2px at 20px 30px,#fff,transparent),
radial-gradient(2px 2px at 100px 80px,#fff,transparent),
radial-gradient(2px 2px at 200px 120px,#fff,transparent),
radial-gradient(2px 2px at 300px 40px,#fff,transparent),
radial-gradient(2px 2px at 400px 200px,#fff,transparent),
radial-gradient(2px 2px at 500px 100px,#fff,transparent),
#020617;

background-size:800px 400px;
}

.scene{
width:600px;
height:450px;
transform:scale(2);
transform-origin:bottom center;
}

/* hoa đung đưa */
.stem{
transform-origin:bottom center;
animation:sway 4s ease-in-out infinite;
}

@keyframes sway{
0%{transform:rotate(-2deg)}
50%{transform:rotate(2deg)}
100%{transform:rotate(-2deg)}
}

/* cỏ mọc */
.grass path{
stroke-dasharray:300;
stroke-dashoffset:300;
animation:grow 2s ease forwards;
}

@keyframes grow{
to{
stroke-dashoffset:0;
}
}

</style>
</head>

<body>

<div class="scene">

<svg viewBox="0 0 400 420">

<!-- CỎ XUNG QUANH -->
<g class="grass">

<path d="M200 400 Q170 280 160 180" stroke="#18c75a" stroke-width="6" fill="none" stroke-linecap="round"/>
<path d="M200 400 Q120 280 100 210" stroke="#22d36a" stroke-width="5" fill="none" stroke-linecap="round"/>
<path d="M200 400 Q260 280 280 210" stroke="#22d36a" stroke-width="5" fill="none" stroke-linecap="round"/>
<path d="M200 400 Q230 260 240 170" stroke="#18c75a" stroke-width="6" fill="none" stroke-linecap="round"/>

</g>

<!-- THÂN HOA TRÁI -->
<g class="stem">

<line x1="200" y1="400" x2="150" y2="220"
stroke="#7a5532" stroke-width="8"/>

<ellipse cx="150" cy="230" rx="30" ry="14"
fill="#1f7a3f" transform="rotate(-30 150 230)"/>

<ellipse cx="150" cy="260" rx="30" ry="14"
fill="#1f7a3f" transform="rotate(30 150 260)"/>

<!-- hoa -->
<g transform="translate(150,200)">

<ellipse cx="0" cy="-30" rx="30" ry="36" fill="#ff9dc0"/>
<ellipse cx="35" cy="0" rx="30" ry="36" fill="#ff9dc0"/>
<ellipse cx="-35" cy="0" rx="30" ry="36" fill="#ff9dc0"/>

<circle cx="0" cy="0" r="16" fill="#ffd166"/>

</g>

</g>

<!-- THÂN HOA GIỮA -->
<g class="stem">

<line x1="200" y1="400" x2="200" y2="180"
stroke="#7a5532" stroke-width="8"/>

<ellipse cx="200" cy="250" rx="30" ry="14"
fill="#1f7a3f" transform="rotate(-30 200 250)"/>

<ellipse cx="200" cy="300" rx="30" ry="14"
fill="#1f7a3f" transform="rotate(30 200 300)"/>

<g transform="translate(200,160)">

<ellipse cx="0" cy="-30" rx="30" ry="36" fill="#ff9dc0"/>
<ellipse cx="35" cy="0" rx="30" ry="36" fill="#ff9dc0"/>
<ellipse cx="-35" cy="0" rx="30" ry="36" fill="#ff9dc0"/>

<circle cx="0" cy="0" r="16" fill="#ffd166"/>

</g>

</g>

<!-- THÂN HOA PHẢI -->
<g class="stem">

<line x1="200" y1="400" x2="250" y2="220"
stroke="#7a5532" stroke-width="8"/>

<ellipse cx="250" cy="230" rx="30" ry="14"
fill="#1f7a3f" transform="rotate(-30 250 230)"/>

<ellipse cx="250" cy="260" rx="30" ry="14"
fill="#1f7a3f" transform="rotate(30 250 260)"/>

<g transform="translate(250,200)">

<ellipse cx="0" cy="-30" rx="30" ry="36" fill="#ff9dc0"/>
<ellipse cx="35" cy="0" rx="30" ry="36" fill="#ff9dc0"/>
<ellipse cx="-35" cy="0" rx="30" ry="36" fill="#ff9dc0"/>

<circle cx="0" cy="0" r="16" fill="#ffd166"/>

</g>

</g>

</svg>

</div>

</body>
</html>
