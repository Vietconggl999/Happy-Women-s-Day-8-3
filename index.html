<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Flower Garden</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;

background:
radial-gradient(2px 2px at 20px 30px,#fff,transparent),
radial-gradient(2px 2px at 100px 80px,#fff,transparent),
radial-gradient(2px 2px at 200px 120px,#fff,transparent),
radial-gradient(2px 2px at 300px 40px,#fff,transparent),
radial-gradient(2px 2px at 400px 200px,#fff,transparent),
radial-gradient(2px 2px at 500px 100px,#fff,transparent),
radial-gradient(2px 2px at 600px 150px,#fff,transparent),
radial-gradient(2px 2px at 700px 70px,#fff,transparent),
radial-gradient(2px 2px at 50px 200px,#fff,transparent),
radial-gradient(2px 2px at 150px 250px,#fff,transparent),
radial-gradient(2px 2px at 250px 300px,#fff,transparent),
radial-gradient(2px 2px at 350px 180px,#fff,transparent),
radial-gradient(2px 2px at 450px 260px,#fff,transparent),
radial-gradient(2px 2px at 550px 220px,#fff,transparent),
radial-gradient(2px 2px at 650px 300px,#fff,transparent),
radial-gradient(2px 2px at 750px 200px,#fff,transparent),
#020617;

background-size:800px 400px;
}

.scene{
position:relative;
width:600px;
height:400px;
transform:scale(1.5) translateY(120px);
transform-origin:bottom center;
animation:plantGrow 2s ease forwards;
}

@keyframes plantGrow{
0%{
transform:scale(1.5) translateY(120px);
opacity:0;
}
100%{
transform:scale(1.5) translateY(0);
opacity:1;
}
}

.stem g{
opacity:0;
animation:flowerAppear 1s ease forwards;
animation-delay:2s;
}

@keyframes flowerAppear{
to{opacity:1;}
}

.stem{
transform-origin:bottom center;
animation:sway 4s ease-in-out infinite;
}

@keyframes sway{
0%{transform:rotate(-2deg)}
50%{transform:rotate(2deg)}
100%{transform:rotate(-2deg)}
}

/* animation cỏ mọc */
.grass path{
stroke-dasharray:300;
stroke-dashoffset:300;
animation:grow 2s ease forwards;
}

@keyframes grow{
to{stroke-dashoffset:0;}
}

/* animation cỏ đung đưa */
.grassTall{
transform-origin:bottom;
animation:grassMove 5s ease-in-out infinite;
}

.grassTall:nth-child(2){animation-delay:1s;}
.grassTall:nth-child(3){animation-delay:2s;}
.grassTall:nth-child(4){animation-delay:0.5s;}

@keyframes grassMove{
0%{transform:rotate(-4deg)}
50%{transform:rotate(4deg)}
100%{transform:rotate(-4deg)}
}

.ground{
position:absolute;
bottom:-260px;
width:100%;
height:220px;
background:linear-gradient(to top,#020617 60%,transparent);
filter:blur(28px);
z-index:10;
pointer-events:none;
}

.flowerGlow{
filter:drop-shadow(0 0 10px #ff9dc0)
       drop-shadow(0 0 20px #ff9dc0);
}

</style>
</head>

<body>

<div class="scene">
<div class="ground"></div>

<svg viewBox="0 0 400 420">

<!-- CỎ -->
<g class="grass">

<!-- cụm trái xa -->
<g class="grassTall">
<path d="M150 400 Q140 330 130 230" stroke="#22d36a" stroke-width="5" fill="none" stroke-linecap="round"/>
<path d="M160 400 Q150 340 140 260" stroke="#18c75a" stroke-width="4" fill="none" stroke-linecap="round"/>
</g>

<!-- cụm trái -->
<g class="grassTall">
<path d="M170 400 Q160 330 150 250" stroke="#22d36a" stroke-width="6" fill="none" stroke-linecap="round"/>
<path d="M170 400 Q140 340 120 270" stroke="#18c75a" stroke-width="5" fill="none" stroke-linecap="round"/>
<path d="M170 400 Q190 340 210 280" stroke="#22d36a" stroke-width="5" fill="none" stroke-linecap="round"/>
</g>

<!-- cụm giữa trái -->
<g class="grassTall">
<path d="M185 400 Q180 330 170 240" stroke="#18c75a" stroke-width="5" fill="none" stroke-linecap="round"/>
<path d="M190 400 Q200 340 210 250" stroke="#22d36a" stroke-width="5" fill="none" stroke-linecap="round"/>
</g>

<!-- cụm giữa -->
<g class="grassTall">
<path d="M200 400 Q200 330 200 230" stroke="#18c75a" stroke-width="7" fill="none" stroke-linecap="round"/>
<path d="M200 400 Q220 330 240 260" stroke="#22d36a" stroke-width="6" fill="none" stroke-linecap="round"/>
<path d="M200 400 Q180 330 160 260" stroke="#22d36a" stroke-width="6" fill="none" stroke-linecap="round"/>
</g>

<!-- cụm giữa phải -->
<g class="grassTall">
<path d="M215 400 Q230 330 240 240" stroke="#18c75a" stroke-width="5" fill="none" stroke-linecap="round"/>
<path d="M220 400 Q240 340 260 250" stroke="#22d36a" stroke-width="5" fill="none" stroke-linecap="round"/>
</g>

<!-- cụm phải -->
<g class="grassTall">
<path d="M230 400 Q250 330 260 250" stroke="#22d36a" stroke-width="6" fill="none" stroke-linecap="round"/>
<path d="M230 400 Q270 340 290 280" stroke="#18c75a" stroke-width="5" fill="none" stroke-linecap="round"/>
<path d="M230 400 Q210 340 200 280" stroke="#22d36a" stroke-width="5" fill="none" stroke-linecap="round"/>
</g>

<!-- cỏ thấp phía trước -->
<g class="grassTall">
<path d="M185 400 Q180 360 175 330" stroke="#22d36a" stroke-width="4" fill="none" stroke-linecap="round"/>
<path d="M195 400 Q195 360 195 330" stroke="#18c75a" stroke-width="5" fill="none" stroke-linecap="round"/>
<path d="M205 400 Q210 360 215 330" stroke="#22d36a" stroke-width="4" fill="none" stroke-linecap="round"/>
</g>

</g>

<!-- HOA TRÁI -->
<g class="stem">

<line x1="200" y1="400" x2="140" y2="220"
stroke="#7a5532" stroke-width="8"/>

<ellipse cx="140" cy="260" rx="20" ry="10" fill="#1f7a3f" transform="rotate(-30 140 260)"/>
<ellipse cx="165" cy="240" rx="20" ry="10" fill="#1f7a3f" transform="rotate(30 165 240)"/>

<g transform="translate(140,220)" class="flowerGlow">

<ellipse cx="-22" cy="-20" rx="22" ry="34" fill="#ff9dc0" transform="rotate(-25)"/>
<ellipse cx="22" cy="-20" rx="22" ry="34" fill="#ff9dc0" transform="rotate(25)"/>
<ellipse cx="0" cy="-45" rx="24" ry="48" fill="#ff9dc0"/>

<ellipse cx="0" cy="-5" rx="18" ry="8" fill="#ffffff"/>
<ellipse cx="0" cy="0" rx="14" ry="6" fill="#ffd166"/>

</g>
</g>

<!-- HOA GIỮA -->
<g class="stem">

<line x1="200" y1="400" x2="200" y2="180"
stroke="#7a5532" stroke-width="8"/>

<ellipse cx="180" cy="280" rx="20" ry="10" fill="#1f7a3f" transform="rotate(-30 180 280)"/>
<ellipse cx="220" cy="250" rx="20" ry="10" fill="#1f7a3f" transform="rotate(30 220 250)"/>

<g transform="translate(200,180)" class="flowerGlow">

<ellipse cx="-22" cy="-20" rx="22" ry="34" fill="#ff9dc0" transform="rotate(-25)"/>
<ellipse cx="22" cy="-20" rx="22" ry="34" fill="#ff9dc0" transform="rotate(25)"/>
<ellipse cx="0" cy="-45" rx="24" ry="48" fill="#ff9dc0"/>

<ellipse cx="0" cy="-5" rx="18" ry="8" fill="#ffffff"/>
<ellipse cx="0" cy="0" rx="14" ry="6" fill="#ffd166"/>

</g>
</g>

<!-- HOA PHẢI -->
<g class="stem">

<line x1="200" y1="400" x2="260" y2="220"
stroke="#7a5532" stroke-width="8"/>

<ellipse cx="235" cy="240" rx="20" ry="10" fill="#1f7a3f" transform="rotate(-30 235 240)"/>
<ellipse cx="260" cy="260" rx="20" ry="10" fill="#1f7a3f" transform="rotate(30 260 260)"/>

<g transform="translate(260,220)" class="flowerGlow">

<ellipse cx="-22" cy="-20" rx="22" ry="34" fill="#ff9dc0" transform="rotate(-25)"/>
<ellipse cx="22" cy="-20" rx="22" ry="34" fill="#ff9dc0" transform="rotate(25)"/>
<ellipse cx="0" cy="-45" rx="24" ry="48" fill="#ff9dc0"/>

<ellipse cx="0" cy="-5" rx="18" ry="8" fill="#ffffff"/>
<ellipse cx="0" cy="0" rx="14" ry="6" fill="#ffd166"/>

</g>
</g>

</svg>

</div>

</body>
</html>
